---
title: "失落王冠"
description: "在一个被遗忘的王国边境，古老的王冠失落于暗影之中。冒险者将踏上一段寻找真相与荣耀的旅程。"
author: "AI-DND 示例剧本"
acts:
  - id: act1
    title: "第一幕：边境小镇的低语"
    synopsis: "冒险者来到迷雾村，从村长口中得知失落王冠的传说。小镇暗流涌动，各方势力蠢蠢欲动。"
    content: |
      浓雾如厚重的幕布，将迷雾村笼罩在一片朦胧之中。冒险者踩着泥泞的小路踏入村庄时，石板路两旁的木屋烟囱正冒着袅袅炊烟。空气中混杂着铁匠铺的煤烟味和醉龙酒馆飘来的麦酒香气。村子不大，却透着一股古老而神秘的气息，仿佛每一块石板都藏着未被诉说的故事。

      冒险者在村中央找到了老格雷姆的小屋。老人正坐在门前的摇椅上，手中摩挲着一枚锈迹斑斑的骑士勋章。他抬起头，浑浊的眼中闪过一丝审视。"你来了……我已经等了三十年了。不，也许更久。时间就像山间的小溪，你看着它流淌，却不知它何时改变了方向。"老人的声音低沉而缓慢，带着岁月的沧桑。他向冒险者讲述了一个古老的传说：三百年前，最后一位国王在战争中神秘失踪，王冠也随之消失。如今，暗影势力正在边境徘徊，似乎在寻找什么。

      布隆德的铁锤在铁砧上敲出铿锵的节奏。他的铺子里摆满了各式武器和工具。而在村子另一头，醉龙酒馆内，玫瑰玛丽正擦拭着永远擦不完的杯子，耳朵却竖听着每一桌的对话。夜深时，冒险者或许会注意到村外闪烁的诡异灯火——那是暗影势力的探子在密林中活动。守卫队长卡洛斯正为此忧心忡忡，他已经连续几夜没有合眼，村里的失踪事件让他感到不安。
  - id: act2
    title: "第二幕：幽暗密林的试炼"
    synopsis: "深入幽暗密林寻找古代遗迹的入口。森林中危机四伏，需要解开女巫的谜题才能前进。"
    content: |
      穿过迷雾村的北出口，一条被藤蔓遮蔽的小路蜿蜒伸入幽暗密林。这里的树木比村中任何建筑都要古老，枝叶交织成天然的穹顶，将阳光切割成碎片。空气中弥漫着潮湿的腐叶气息，偶尔传来不知名野兽的低吼。冒险者必须小心前行，因为这片森林从不欢迎陌生人。每一步都可能是陷阱，每一棵树后都可能藏着危险。

      无名者的小屋隐藏在一片荆棘之后。这个蓬头垢面的老人不愿与任何人交谈，但如果冒险者展现出诚意——或者提到了"国王"二字——他可能会喃喃说出一些令人费解的话："记忆……那些被偷走的记忆……王冠不是用来戴的，是用来关的……"他的眼神空洞而深邃，仿佛穿透了时空，看到了三百年前的真相。

      密林深处，赛琳娜的小屋矗立在一棵巨大的古橡树下。屋内挂满了风干的草药和闪烁的水晶球。她会提出三道谜题来考验冒险者的智慧。"第一题：我没有翅膀，却能飞遍天涯；我没有声音，却能传遍四海。我是什么？""第二题：越是使用，越是富有。越是囤积，越是贫穷。我是什么？""第三题：我诞生于光明，却只能存在于黑暗。阳光是我的父亲，但一见我便消散。我是什么？"三道谜题全部答对后，赛琳娜会指向密林最深处——月光下，遗迹的入口会显现出来。而在密林中，冒险者可能会遇到狐狸杰克——他正躲在一棵大树后，鬼鬼祟祟地观察着什么，声称发现了暗影势力的营地，想和冒险者做笔交易。
  - id: act3
    title: "第三幕：遗迹深处的真相"
    synopsis: "进入遗迹，面对守护者的考验。王冠背后的真相令人震惊——它并非宝物，而是诅咒的容器。"
    content: |
      遗迹的大门由黑色大理石构成，上面刻满了古代魔法符文。当月光照射其上时，符文会发出幽蓝色的光芒，石门缓缓开启。一股尘封已久的气息扑面而来，那是时间凝固的味道，也是真相即将揭晓的预感。遗迹内部是一个巨大的地下殿堂，墙壁上镶嵌着发出微光的宝石，照亮了四周。前厅中央有一座石台，上面放着一卷泛黄的羊皮纸——那是最后一位国王的遗书。

      遗书内容令人震惊："致后来者：当你读到这封信时，说明封印已经开始松动。我并非失踪，而是自愿走入这座遗迹。王冠中封印的，不是邪恶，而是整个王国的记忆。三百年前，一场名为'遗忘之灾'的浩劫即将降临——它会将所有人的记忆吞噬殆尽，让文明倒退千年。唯一的方法，是将所有记忆封印于王冠之中。我选择牺牲自己，成为这封印的守护者。如今，暗影势力企图打破封印，释放这些记忆——但他们不知道，记忆的洪流同样会摧毁这个已经安定了三百年的世界。选择权在你：保持封印，或者释放真相。"

      国王的灵魂以幻影的形式出现在冒险者面前。他不会战斗，而是会问一个问题："告诉我，冒险者——你认为一个没有过去的文明，和一个被过去的重量压垮的文明，哪一个更可悲？"冒险者的回答将决定最终的结局。结局一：保持封印，王国继续和平，但真相永远被埋葬。结局二：释放记忆，三百年的历史涌入每个人的脑海，世界将永远改变。结局三：如果冒险者足够智慧，或许能找到第三种方式——将记忆缓慢释放，让世界有时间适应。
endings:
  - id: ending_seal
    title: "永恒的封印"
    condition: "冒险者选择维持王冠封印，不揭开真相。"
    synopsis: "王国继续享有三百年的和平，但关于王冠与国王的真相被永远埋葬于遗迹之中。"
    content: |
      冒险者将王冠重新放回石台，退后三步，看着遗迹的大门缓缓关闭。没有人知道这里发生过什么，迷雾村依旧宁静，只是偶尔会有人谈起那位神秘的过客。

      多年后，老格雷姆去世，他手中的锈迹勋章被埋在村外的橡树下。布隆德依旧打铁，玫瑰玛丽依旧擦拭着杯子，而卡洛斯队长终于松了一口气——失踪事件不再发生，暗影势力悄然撤退。

      世界没有改变，但也没有崩塌。国王的记忆与王国的历史继续沉睡在黑暗之中，等待下一个不知情的冒险者。也许这才是最好的结局——有些真相，本就不该被揭开。
  - id: ending_release
    title: "记忆的洪流"
    condition: "冒险者选择打破封印，释放王冠中所有记忆。"
    synopsis: "三百年的历史与记忆涌入每个人的脑海，王国 Overnight 发生了翻天覆地的变化。"
    content: |
      当王冠被摘下的那一刻，一道耀眼的光芒从宝石中迸发而出，穿透遗迹的穹顶，直冲云霄。光芒像涟漪一样扩散，覆盖了整个王国。

      迷雾村的居民突然停下了手中的活计，他们的眼中涌出泪水——他们记起了三百年前的亲人、家园、战火与离别。布隆德扔下铁锤，跪倒在地，他想起了祖父为国王铸剑时的荣耀。玫瑰玛丽手中的杯子滑落，她想起了自己真正的名字，她曾是王宫的侍女。老格雷姆若有所思地望着远方，终于露出了微笑。

      但记忆并非只有美好。人们也记起了那场几乎毁灭一切的灾难，记起了背叛、饥饿与恐惧。王国在一夜之间陷入了混乱——有人欣喜若狂，有人痛不欲生。世界永远改变了，没有人能够回到过去。
  - id: ending_balance
    title: "渐进的黎明"
    condition: "冒险者找到折中之道，将记忆缓慢释放，让世界逐步适应。"
    synopsis: "国王的幻影认可了冒险者的智慧，封印以温和的方式消解，历史与现实达成了和解。"
    content: |
      冒险者没有急于摘下王冠，而是向国王的幻影提出了一个提议：不是所有记忆都需要在一瞬间释放。如果能让王冠的力量像春雨一样缓缓渗透，人们就能在梦境中逐渐记起过去，而不会因此被压垮。

      国王沉默良久，最终点了点头。王冠的光芒开始变得柔和，像月光一样笼罩着整个王国。从那天起，每当夜晚降临，人们都会在梦中看到一些片段——一个古老的战场、一座辉煌的宫殿、一位微笑的国王。这些记忆不会让他们疯狂，而是像传说一样，慢慢成为他们生活的一部分。

      迷雾村开始发生变化。布隆德在梦中学会了失传已久的铸剑技艺，玫瑰玛丽开始讲述她"梦见"的宫廷故事，而学者伊莎贝尔终于确认了历史与梦境的交汇点。王国没有崩溃，而是在回忆与现实的交织中，走向了一个新的黎明。
